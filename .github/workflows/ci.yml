name: CI
on: [push, pull_request, workflow_dispatch]
permissions:
  contents: read
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Audit public surface
        run: python3 scripts/check_public_surface.py
      - name: Build
        run: swift build
      - name: Test
        run: swift test
