name: CI
on: [push, pull_request, workflow_dispatch]
permissions:
  contents: read
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Audit public surface
        run: python3 scripts/check_public_surface.py
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Build generic iOS target
        run: >-
          xcodebuild -quiet -scheme kdna-app-shared
          -destination 'generic/platform=iOS'
          -derivedDataPath "$RUNNER_TEMP/kdna-app-shared-ios-derived"
          -clonedSourcePackagesDirPath "$RUNNER_TEMP/kdna-app-shared-ios-packages"
          -packageCachePath "$RUNNER_TEMP/kdna-app-shared-ios-cache"
          -disableAutomaticPackageResolution
          -onlyUsePackageVersionsFromResolvedFile
          CODE_SIGNING_ALLOWED=NO build
